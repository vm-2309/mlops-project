name: Smart Crop MLOps CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  train-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model
        run: python -m source.train

      - name: Run tests
        run: pytest tests/

      - name: Verify model artifacts
        run: |
          test -f models/crop_model.pkl
          test -f models/risk_model.pkl
      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: models/