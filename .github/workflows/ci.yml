name: Smart Crop MLOps CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/

      - name: Train model
        run: |
          python -m source.train

      - name: Verify model artifacts
        run: |
          if [ ! -f models/crop_model.pkl ]; then
            echo "crop_model.pkl not found!"
            exit 1
          fi
          if [ ! -f models/risk_model.pkl ]; then
            echo "risk_model.pkl not found!"
            exit 1
          fi